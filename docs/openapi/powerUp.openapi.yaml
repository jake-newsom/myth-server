openapi: 3.0.0
info:
  title: Power Up API
  description: API endpoints for managing user card power ups
  version: 1.0.0

paths:
  /api/power-ups/stats/{cardId}:
    get:
      summary: Get power-up position statistics for a character
      description: |
        Returns power-up allocation statistics aggregated across all player instances of a character,
        covering every rarity variant (common, rare, epic, legendary, +, ++, +++).

        Pass the `base_card_id` from any owned card or card library entry. The server resolves
        this to the underlying character and aggregates across all rarities automatically —
        so epic Skadi, common Skadi, and Skadi+ are all included in the same result.
        No authentication required.

        Two distribution views are returned:
        - `aggregate_distribution`: share of every point ever spent, weighted by how much each player invested
        - `average_distribution`: each card instance's own split averaged equally — what a "typical" card looks like
      tags:
        - Power Ups
      parameters:
        - name: cardId
          in: path
          required: true
          description: The base_card_id from an owned card or card library entry (card_variant_id)
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        "200":
          description: Power-up position statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      character_id:
                        type: string
                        format: uuid
                        example: "123e4567-e89b-12d3-a456-426614174000"
                      sample_size:
                        type: integer
                        description: Number of card instances (across all rarities) with at least one power-up applied
                        example: 120
                      totals:
                        $ref: "#/components/schemas/PowerValues"
                      aggregate_distribution:
                        type: object
                        description: |
                          Fraction of all points spent per position (values sum to ~1.0).
                          Weighted by total investment — cards with more power-ups applied have more influence.
                        properties:
                          top:
                            type: number
                            format: float
                            example: 0.5
                          bottom:
                            type: number
                            format: float
                            example: 0.25
                          left:
                            type: number
                            format: float
                            example: 0.13
                          right:
                            type: number
                            format: float
                            example: 0.12
                      average_distribution:
                        type: object
                        description: |
                          Each card instance's own position split, averaged equally across all instances.
                          Reflects what a "typical" card looks like regardless of level or total investment.
                        properties:
                          top:
                            type: number
                            format: float
                            example: 0.48
                          bottom:
                            type: number
                            format: float
                            example: 0.27
                          left:
                            type: number
                            format: float
                            example: 0.14
                          right:
                            type: number
                            format: float
                            example: 0.11
              examples:
                with_data:
                  summary: Character with power-up data
                  value:
                    status: success
                    data:
                      character_id: "123e4567-e89b-12d3-a456-426614174000"
                      sample_size: 120
                      totals:
                        top: 500
                        bottom: 250
                        left: 130
                        right: 120
                      aggregate_distribution:
                        top: 0.5
                        bottom: 0.25
                        left: 0.13
                        right: 0.12
                      average_distribution:
                        top: 0.48
                        bottom: 0.27
                        left: 0.14
                        right: 0.11
                no_data:
                  summary: Character with no power-up data
                  value:
                    status: success
                    data:
                      character_id: "123e4567-e89b-12d3-a456-426614174000"
                      sample_size: 0
                      totals:
                        top: 0
                        bottom: 0
                        left: 0
                        right: 0
                      aggregate_distribution:
                        top: 0
                        bottom: 0
                        left: 0
                        right: 0
                      average_distribution:
                        top: 0
                        bottom: 0
                        left: 0
                        right: 0
        "400":
          description: Bad request - missing cardId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/power-ups/apply:
    post:
      summary: Apply a level up boost to a user card
      description: |
        Applies a power up enhancement to a user's card instance. Cards can only have (level - 1) power ups.
        For example, a level 5 card can have maximum 4 power ups. If the card already has the maximum number 
        of power ups for its level, the request will be rejected.
      tags:
        - Power Ups
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_card_instance_id
                - power_up_data
              properties:
                user_card_instance_id:
                  type: string
                  format: uuid
                  description: The ID of the user card instance to apply the power up to
                  example: "123e4567-e89b-12d3-a456-426614174000"
                power_up_data:
                  $ref: "#/components/schemas/PowerValues"
            examples:
              basic_power_up:
                summary: Basic power up example
                value:
                  user_card_instance_id: "123e4567-e89b-12d3-a456-426614174000"
                  power_up_data:
                    top: 1
                    bottom: 0
                    left: 0
                    right: 1
      responses:
        "200":
          description: Power up applied successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Power up applied successfully! Card now has 1 power up(s)."
                  data:
                    type: object
                    properties:
                      user_card_instance_id:
                        type: string
                        format: uuid
                        example: "123e4567-e89b-12d3-a456-426614174000"
                      power_up_count:
                        type: integer
                        example: 1
                      power_up_data:
                        $ref: "#/components/schemas/PowerValues"
        "400":
          description: Bad request - invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_field:
                  summary: Missing required field
                  value:
                    success: false
                    error:
                      message: "user_card_instance_id is required"
                invalid_power_data:
                  summary: Invalid power up data
                  value:
                    success: false
                    error:
                      message: "power_up_data must contain numeric values for top, bottom, left, and right"
                negative_values:
                  summary: Negative power up values
                  value:
                    success: false
                    error:
                      message: "Invalid power up values"
                    details: "All power up values must be non-negative. Power ups can only add to existing values, not reduce them."
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Card not found or not owned by user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: "Card not found or not owned by user"
        "409":
          description: Conflict - card already has maximum power ups for its level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  message: "Card already has maximum power ups for its level (3). Maximum allowed: 2, Current power ups: 2"
                details: "Card already has maximum power ups for its level (3). Maximum allowed: 2, Current power ups: 2"

  /api/power-ups/{userCardInstanceId}:
    get:
      summary: Get power up information for a specific user card
      description: Retrieves the current power up data for a user's card instance
      tags:
        - Power Ups
      security:
        - bearerAuth: []
      parameters:
        - name: userCardInstanceId
          in: path
          required: true
          description: The ID of the user card instance
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        "200":
          description: Power up information retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user_card_instance_id:
                        type: string
                        format: uuid
                        example: "123e4567-e89b-12d3-a456-426614174000"
                      power_up_count:
                        type: integer
                        example: 1
                      power_up_data:
                        $ref: "#/components/schemas/PowerValues"
                      created_at:
                        type: string
                        format: date-time
                        example: "2023-10-19T10:30:00Z"
                      updated_at:
                        type: string
                        format: date-time
                        example: "2023-10-19T10:30:00Z"
              examples:
                with_power_ups:
                  summary: Card with power ups
                  value:
                    success: true
                    data:
                      user_card_instance_id: "123e4567-e89b-12d3-a456-426614174000"
                      power_up_count: 2
                      power_up_data:
                        top: 2
                        bottom: 1
                        left: 0
                        right: 1
                      created_at: "2023-10-19T10:30:00Z"
                      updated_at: "2023-10-19T11:45:00Z"
                no_power_ups:
                  summary: Card without power ups
                  value:
                    success: true
                    message: "No power ups applied to this card"
                    data:
                      user_card_instance_id: "123e4567-e89b-12d3-a456-426614174000"
                      power_up_count: 0
                      power_up_data:
                        top: 0
                        bottom: 0
                        left: 0
                        right: 0
        "400":
          description: Bad request - invalid user card instance ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Card not found or not owned by user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/power-ups/{userCardInstanceId}/validate:
    get:
      summary: Validate if a power up can be applied to a user card
      description: |
        Checks if a power up can be applied to the specified user card instance.
        Returns information about the card's current level and power up count. Cards can have maximum (level - 1) power ups.
      tags:
        - Power Ups
      security:
        - bearerAuth: []
      parameters:
        - name: userCardInstanceId
          in: path
          required: true
          description: The ID of the user card instance
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      can_apply_power_up:
                        type: boolean
                        example: true
                      current_level:
                        type: integer
                        example: 3
                      current_power_up_count:
                        type: integer
                        example: 2
                      error:
                        type: string
                        nullable: true
                        example: null
              examples:
                can_apply:
                  summary: Power up can be applied
                  value:
                    success: true
                    data:
                      can_apply_power_up: true
                      current_level: 3
                      current_power_up_count: 2
                      error: null
                cannot_apply:
                  summary: Power up cannot be applied
                  value:
                    success: true
                    data:
                      can_apply_power_up: false
                      current_level: 3
                      current_power_up_count: 2
                      error: "Card already has maximum power ups for its level (3). Maximum allowed: 2, Current power ups: 2"
        "400":
          description: Bad request - invalid user card instance ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    PowerValues:
      type: object
      description: Power values for each direction of a card. All values must be non-negative (>= 0) as power ups can only add to existing values, not reduce them.
      required:
        - top
        - bottom
        - left
        - right
      properties:
        top:
          type: integer
          description: Top power value
          minimum: 0
          example: 1
        bottom:
          type: integer
          description: Bottom power value
          minimum: 0
          example: 0
        left:
          type: integer
          description: Left power value
          minimum: 0
          example: 0
        right:
          type: integer
          description: Right power value
          minimum: 0
          example: 1

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
              example: "Error message"
        details:
          type: string
          description: Additional error details
          example: "Detailed error information"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
