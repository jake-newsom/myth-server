openapi: 3.0.0
info:
  title: Viking Vengeance - User Card API
  description: API endpoints for managing user's card collection
  version: 1.0.0

paths:
  /api/user-cards:
    get:
      summary: Get all cards owned by the authenticated user
      description: Retrieves a list of card instances owned by the currently authenticated user
      tags:
        - User Cards
      security:
        - bearerAuth: []
      parameters:
        - name: rarity
          in: query
          description: Filter by card rarity (including variant rarities with +, ++, +++)
          required: false
          schema:
            type: string
            enum:
              [
                common,
                uncommon,
                rare,
                epic,
                legendary,
                common+,
                uncommon+,
                rare+,
                epic+,
                legendary+,
                common++,
                uncommon++,
                rare++,
                epic++,
                legendary++,
                common+++,
                uncommon+++,
                rare+++,
                epic+++,
                legendary+++,
              ]
        - name: name
          in: query
          description: Filter by card name (case-insensitive, partial match)
          required: false
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by a specific card tag
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of the user's card instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCard"
        "401":
          description: Unauthorized - User not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/user-cards/{userCardInstanceId}/lock:
    patch:
      summary: Lock or unlock a user card
      description: |
        Sets the `is_locked` flag for a specific user-owned card instance.
        Locked cards cannot be sacrificed (single or bulk) and cannot be used as
        a source card for XP transfer.
      tags:
        - User Cards
      security:
        - bearerAuth: []
      parameters:
        - name: userCardInstanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User-owned card instance ID to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - is_locked
              properties:
                is_locked:
                  type: boolean
                  description: True to lock the card, false to unlock it
            examples:
              lockCard:
                summary: Lock a card
                value:
                  is_locked: true
              unlockCard:
                summary: Unlock a card
                value:
                  is_locked: false
      responses:
        "200":
          description: Card lock state updated successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - user_card_instance_id
                  - is_locked
                properties:
                  user_card_instance_id:
                    type: string
                    format: uuid
                  is_locked:
                    type: boolean
        "400":
          description: Invalid request body or missing parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - User not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Card not found or does not belong to user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    PowerValues:
      type: object
      properties:
        top:
          type: integer
          example: 5
        right:
          type: integer
          example: 5
        bottom:
          type: integer
          example: 5
        left:
          type: integer
          example: 5
      required:
        - top
        - right
        - bottom
        - left

    SpecialAbility:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ability_id:
          type: string
          format: uuid
        description:
          type: string
        triggerMoments:
          type: array
          items:
            type: string
            enum: [OnPlace, OnFlip, OnFlipped, OnTurnStart, OnTurnEnd, OnRoundEnd, OnRoundStart, AnyOnFlip, AnyOnFlipped, OnDefend, AnyOnDefend, HandOnFlip, BoardOnFlip, HandOnPlace, HandOnDefend, BoardOnPlace, BeforeCombat, AfterCombat, OnCombat]
        parameters:
          type: object
          description: Additional parameters for the ability
          additionalProperties: true
      required:
        - id
        - name
        - ability_id
        - description
        - triggerMoments
        - parameters

    BaseCardData:
      type: object
      properties:
        card_id:
          type: string
          format: uuid
        name:
          type: string
        tags:
          type: array
          items:
            type: string
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        image_url:
          type: string
        base_power:
          $ref: "#/components/schemas/PowerValues"
        set_id:
          type: string
          format: uuid
          description: Identifier for the set this card belongs to
          nullable: true
        special_ability:
          $ref: "#/components/schemas/SpecialAbility"
          nullable: true
      required:
        - card_id
        - name
        - tags
        - rarity
        - image_url
        - base_power
        - set_id

    UserCard:
      type: object
      description: A card instance owned by a user, including base card data and user-specific enhancements
      properties:
        user_card_instance_id:
          type: string
          format: uuid
          description: Unique identifier for this specific card instance
        base_card_id:
          type: string
          format: uuid
          description: Reference to the base card definition
        base_card_data:
          $ref: "#/components/schemas/BaseCardData"
          description: The complete base card information
        level:
          type: integer
          description: Current level of the card instance
          minimum: 1
        xp:
          type: integer
          description: Current experience points of the card instance
          minimum: 0
        is_locked:
          type: boolean
          description: Whether this card instance is locked from sacrifice and XP-source transfer actions
        power_enhancements:
          $ref: "#/components/schemas/PowerValues"
          description: Additional power values from level up boosts applied to the card (accumulated from all power ups)
      required:
        - user_card_instance_id
        - base_card_id
        - base_card_data
        - level
        - xp
        - is_locked
        - power_enhancements

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Error message"
