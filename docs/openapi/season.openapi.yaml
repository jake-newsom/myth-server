openapi: 3.0.0
info:
  title: Viking Vengeance Seasons API
  description: API endpoints for seasonal mythology soul competition
  version: 1.0.0

paths:
  /api/seasons/current:
    get:
      summary: Get current season context
      description: Returns active season metadata or off-season state.
      tags:
        - Seasons
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current season context
          content:
            application/json:
              schema:
                type: object
                properties:
                  off_season:
                    type: boolean
                  current_season:
                    $ref: "#/components/schemas/SeasonDefinition"
                    nullable: true
                  next_season_start_at:
                    type: string
                    format: date-time
                    nullable: true
                  requires_choice:
                    type: boolean
                    nullable: true

  /api/seasons/current/choice:
    get:
      summary: Get current user's mythology choice
      tags:
        - Seasons
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current season mythology choice state
          content:
            application/json:
              schema:
                type: object
                properties:
                  off_season:
                    type: boolean
                  season_id:
                    type: string
                    nullable: true
                  choice:
                    type: object
                    nullable: true
                    properties:
                      set_id:
                        type: string
                        format: uuid
                      locked_at:
                        type: string
                        format: date-time
    post:
      summary: Lock mythology choice for current season
      tags:
        - Seasons
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - set_id
              properties:
                set_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Mythology locked
        "400":
          description: Invalid request
        "409":
          description: Choice already locked or off-season

  /api/seasons/current/standings:
    get:
      summary: Get current mythology soul standings
      tags:
        - Seasons
      responses:
        "200":
          description: Current season mythology standings
          content:
            application/json:
              schema:
                type: object
                properties:
                  off_season:
                    type: boolean
                  season_id:
                    type: string
                    nullable: true
                  standings:
                    type: array
                    items:
                      type: object
                      properties:
                        set_id:
                          type: string
                          format: uuid
                        set_name:
                          type: string
                        image_url:
                          type: string
                          nullable: true
                        souls_total:
                          type: integer
                        placement:
                          type: integer

  /api/seasons/current/leaderboard:
    get:
      summary: Get paginated player souls leaderboard for a mythology
      tags:
        - Seasons
      parameters:
        - name: set_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Mythology set ID to view leaderboard for
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Paginated player leaderboard for selected mythology
          content:
            application/json:
              schema:
                type: object
                properties:
                  off_season:
                    type: boolean
                  season_id:
                    type: string
                    nullable: true
                  set_id:
                    type: string
                    format: uuid
                  leaderboard:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:
                          type: string
                          format: uuid
                        username:
                          type: string
                        souls_total:
                          type: integer
                        rank:
                          type: integer
                  pagination:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_players:
                        type: integer
                      per_page:
                        type: integer
        "400":
          description: Invalid or missing query parameters

  /api/seasons/current/me:
    get:
      summary: Get current user's season soul progress
      tags:
        - Seasons
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User season progress

  /api/seasons/current/rewards/status:
    get:
      summary: Get current user's season reward status
      tags:
        - Seasons
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User season reward status

  /api/seasons:
    get:
      summary: List season definitions (admin)
      tags:
        - Seasons Admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Season definitions

  /api/seasons/ensure-buffer:
    post:
      summary: Ensure season buffer exists (admin)
      tags:
        - Seasons Admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Season buffer ensured

  /api/seasons/{seasonId}/dates:
    patch:
      summary: Update season start/end dates (admin)
      tags:
        - Seasons Admin
      security:
        - bearerAuth: []
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - start_at
                - end_at
              properties:
                start_at:
                  type: string
                  format: date-time
                end_at:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Season dates updated
        "400":
          description: Validation error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SeasonDefinition:
      type: object
      properties:
        season_id:
          type: string
        name:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [scheduled, active, finalizing, finalized, cancelled]
