openapi: 3.0.0
info:
  title: Viking Vengeance - Character API
  description: API endpoints for retrieving characters with nested card variants.
  version: 1.0.0

paths:
  /api/characters:
    get:
      summary: Get all characters with nested variants
      description: |
        Retrieve all characters and include their card art variants in a nested `variants` array.
        Character `description` stores the general mythological context, while each variant can
        include its own `description` for art/story-specific lore.

        Only entries with `released_at` in the past are returned unless the request includes a
        valid Bearer token for a user with the `admin` role.
      tags:
        - Characters
      responses:
        "200":
          description: Successfully retrieved characters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterWithVariants"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/characters/{characterId}/borders/eligible:
    get:
      summary: Get borders eligible for a character (owned + locked)
      description: |
        Returns every active border that can be applied to the provided character,
        including borders the user has not unlocked yet.
      tags:
        - Characters
        - Borders
      security:
        - bearerAuth: []
      parameters:
        - name: characterId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Character-eligible borders retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CharacterEligibleBorder"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Character not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    PowerValues:
      type: object
      properties:
        top:
          type: integer
        right:
          type: integer
        bottom:
          type: integer
        left:
          type: integer
      required:
        - top
        - right
        - bottom
        - left

    CharacterVariant:
      type: object
      properties:
        card_variant_id:
          type: string
          format: uuid
        rarity:
          type: string
        image_url:
          type: string
        description:
          type: string
          nullable: true
          description: Variant-specific lore for this particular card art.
        attack_animation:
          type: string
          nullable: true
        is_exclusive:
          type: boolean
        released_at:
          type: string
          format: date-time
          description: >
            Variant is hidden from public catalog until this time (UTC).
            Admins with a valid Bearer token see all entries regardless.
        created_at:
          type: string
          format: date-time
          nullable: true
      required:
        - card_variant_id
        - rarity
        - image_url
        - is_exclusive
        - released_at

    CharacterWithVariants:
      type: object
      properties:
        character_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
          description: General mythological description shared by all variants.
        type:
          type: string
        base_power:
          $ref: "#/components/schemas/PowerValues"
        special_ability_id:
          type: string
          format: uuid
          nullable: true
        set_id:
          type: string
          format: uuid
          nullable: true
        tags:
          type: array
          items:
            type: string
        released_at:
          type: string
          format: date-time
          description: >
            Character is hidden from public catalog until this time (UTC).
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        variants:
          type: array
          items:
            $ref: "#/components/schemas/CharacterVariant"
      required:
        - character_id
        - name
        - type
        - base_power
        - special_ability_id
        - tags
        - variants

    CharacterEligibleBorder:
      allOf:
        - $ref: "./border.openapi.yaml#/components/schemas/CardBorder"
        - type: object
          properties:
            is_owned:
              type: boolean
            is_locked:
              type: boolean
          required:
            - is_owned
            - is_locked

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        message:
          type: string
      required:
        - status
        - message
